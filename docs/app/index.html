<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautify GitHub Profile — Generator</title>
  <meta name="description" content="ابزار رایگان ساخت و زیباسازی پروفایل گیت‌هاب — بج، استت، ویدجت و قالب آماده">
  <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #7d8590;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --danger: #f85149;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Vazirmatn', -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--text2); margin-top: 8px; font-size: 0.95rem; }

    /* Input section */
    .input-section {
      display: flex;
      gap: 10px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .input-section input {
      flex: 1;
      min-width: 200px;
      padding: 14px 18px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .input-section input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }
    .input-section button {
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-section button:hover { background: #4c9aed; }
    .input-section button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text2);
    }
    .loading.active { display: block; }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Analysis results */
    .results { display: none; margin-top: 20px; }
    .results.active { display: block; }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .profile-info img {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid var(--border);
    }
    .profile-info .info h3 { font-size: 1.2rem; }
    .profile-info .info p { color: var(--text2); font-size: 0.9rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .stat-box {
      background: var(--bg3);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-box .num { font-size: 1.4rem; font-weight: bold; }
    .stat-box .label { color: var(--text2); font-size: 0.8rem; }

    /* Missing items */
    .missing-list { margin-top: 12px; }
    .missing-list .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.95rem;
    }
    .check { color: var(--accent2); }
    .cross { color: var(--danger); }

    /* Template selector */
    .section-title {
      font-size: 1.1rem;
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    .template-card {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .template-card:hover { border-color: var(--accent); }
    .template-card.selected {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }
    .template-card .icon { font-size: 1.8rem; }
    .template-card .name { font-size: 0.95rem; margin-top: 6px; }

    /* Theme selector */
    .theme-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .theme-chip {
      padding: 8px 16px;
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      color: var(--text);
      transition: all 0.2s;
    }
    .theme-chip:hover { border-color: var(--accent); }
    .theme-chip.selected {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
      color: var(--accent);
    }

    /* Preview */
    .preview-section { margin-top: 24px; }
    .preview-frame {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 12px;
    }
    .preview-frame iframe {
      width: 100%;
      min-height: 400px;
      border: none;
      display: block;
    }

    /* Output */
    .output-section { margin-top: 24px; }
    .code-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 12px;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .code-header span { color: var(--text2); font-size: 0.85rem; }
    .copy-btn {
      padding: 6px 14px;
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .copy-btn:hover { opacity: 0.85; }
    .code-block pre {
      padding: 16px;
      overflow-x: auto;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      direction: ltr;
      text-align: left;
    }

    /* Error */
    .error {
      display: none;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--danger);
      margin-top: 16px;
    }
    .error.active { display: block; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 0.85rem;
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.5rem; }
      .container { padding: 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🪄 Beautify GitHub Profile</h1>
      <p>پروفایل گیت‌هابت رو تحلیل کن و یه README خفن بساز</p>
    </div>

    <!-- Input -->
    <div class="input-section">
      <input type="text" id="username" placeholder="یوزرنیم گیت‌هاب (مثلاً rzashakeri)" dir="ltr" autocomplete="off">
      <button id="analyzeBtn" onclick="analyze()">🚀 تحلیل</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top:12px;">در حال بررسی پروفایل...</p>
    </div>

    <!-- Error -->
    <div class="error" id="error"></div>

    <!-- Results -->
    <div class="results" id="results">
      <!-- Profile info -->
      <div class="card" id="profileCard"></div>

      <!-- Templates -->
      <div class="section-title">🎨 انتخاب قالب</div>
      <div class="template-grid" id="templateGrid">
        <div class="template-card selected" data-template="full" onclick="selectTemplate(this)">
          <div class="icon">🏆</div>
          <div class="name">کامل</div>
        </div>
        <div class="template-card" data-template="minimal" onclick="selectTemplate(this)">
          <div class="icon">📝</div>
          <div class="name">مینیمال</div>
        </div>
        <div class="template-card" data-template="stats" onclick="selectTemplate(this)">
          <div class="icon">📊</div>
          <div class="name">فقط استت</div>
        </div>
      </div>

      <!-- Themes -->
      <div class="section-title">🌈 تم رنگی</div>
      <div class="theme-grid" id="themeGrid"></div>

      <!-- Preview -->
      <div class="preview-section">
        <div class="section-title">👁️ پیش‌نمایش</div>
        <div class="preview-frame">
          <iframe id="previewFrame" title="Preview"></iframe>
        </div>
      </div>

      <!-- Output -->
      <div class="output-section">
        <div class="section-title">📋 کد README</div>
        <div class="code-block">
          <div class="code-header">
            <span>README.md</span>
            <button class="copy-btn" onclick="copyCode()">📋 کپی</button>
          </div>
          <pre id="codeOutput"></pre>
        </div>
      </div>
    </div>

    <div class="footer">
      ساخته شده با ❤️ توسط <a href="https://github.com/rzashakeri" target="_blank">Reza Shakeri</a> ·
      <a href="https://github.com/rzashakeri/beautify-github-profile" target="_blank">GitHub</a> ·
      <a href="https://t.me/barnamenevisichannel" target="_blank">Telegram</a>
    </div>
  </div>

  <script>
    // --- State ---
    let profileData = null;
    let selectedTemplate = 'full';
    let selectedTheme = 'dark';

    const THEMES = [
      'dark', 'radical', 'merko', 'gruvbox', 'tokyonight',
      'dracula', 'synthwave', 'nord', 'algolia', 'monokai'
    ];

    const BADGE_MAP = {
      'JavaScript': 'javascript-%23323330.svg?logo=javascript',
      'TypeScript': 'typescript-%23007ACC.svg?logo=typescript&logoColor=white',
      'Python': 'python-%2314354C.svg?logo=python',
      'Java': 'java-%23ED8B00.svg?logo=java',
      'Go': 'go-%2300ADD8.svg?logo=go&logoColor=white',
      'Rust': 'rust-%23000000.svg?logo=rust',
      'C': 'c-%23A8B9CC.svg?logo=c&logoColor=white',
      'C++': 'c++-%2300599C.svg?logo=c%2B%2B&logoColor=white',
      'C#': 'c%23-%23239120.svg?logo=csharp&logoColor=white',
      'PHP': 'php-%23777BB4.svg?logo=php&logoColor=white',
      'Ruby': 'ruby-%23CC342D.svg?logo=ruby&logoColor=white',
      'Swift': 'swift-%23FA7343.svg?logo=swift&logoColor=white',
      'Kotlin': 'kotlin-%237F52FF.svg?logo=kotlin&logoColor=white',
      'Dart': 'dart-%230175C2.svg?logo=dart&logoColor=white',
      'HTML': 'HTML5-%23E34F26.svg?logo=html5&logoColor=white',
      'CSS': 'CSS3-%231572B6.svg?logo=css3',
      'Shell': 'shell-%2389E051.svg?logo=shell',
      'Vue': 'vue.js-%2335495e.svg?logo=vuedotjs',
      'Docker': 'docker-%230db7ed.svg?logo=docker&logoColor=white',
      'HTML5': 'HTML5-%23E34F26.svg?logo=html5&logoColor=white',
      'CSS3': 'CSS3-%231572B6.svg?logo=css3',
    };

    const SKILL_ICON_MAP = {
      'JavaScript': 'javascript', 'TypeScript': 'typescript', 'Python': 'python',
      'Java': 'java', 'Go': 'go', 'Rust': 'rust', 'C': 'c', 'C++': 'cpp',
      'C#': 'csharp', 'PHP': 'php', 'Ruby': 'ruby', 'Swift': 'swift',
      'Kotlin': 'kotlin', 'Dart': 'dart', 'HTML': 'html5', 'CSS': 'css3',
      'Shell': 'bash', 'Vue': 'vue', 'Docker': 'docker', 'HTML5': 'html5', 'CSS3': 'css3',
    };

    // --- Init themes ---
    function initThemes() {
      const grid = document.getElementById('themeGrid');
      grid.innerHTML = THEMES.map((t, i) =>
        `<button class="theme-chip ${i === 0 ? 'selected' : ''}" data-theme="${t}" onclick="selectTheme(this)">${t}</button>`
      ).join('');
    }
    initThemes();

    // --- Analyze GitHub profile ---
    async function analyze() {
      const username = document.getElementById('username').value.trim().replace(/^@/, '');
      if (!username) return;

      const btn = document.getElementById('analyzeBtn');
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const error = document.getElementById('error');

      btn.disabled = true;
      btn.textContent = '⏳';
      loading.classList.add('active');
      results.classList.remove('active');
      error.classList.remove('active');

      try {
        // Fetch user data
        const userRes = await fetch(`https://api.github.com/users/${username}`);
        if (userRes.status === 404) throw new Error(`کاربر "${username}" پیدا نشد`);
        if (!userRes.ok) throw new Error('خطا در ارتباط با GitHub API');
        const user = await userRes.json();

        // Fetch repos
        const reposRes = await fetch(`https://api.github.com/users/${username}/repos?sort=stars&per_page=100`);
        const repos = await reposRes.json();

        // Fetch README
        let readme = null;
        try {
          const readmeRes = await fetch(`https://api.github.com/repos/${username}/${username}/readme`, {
            headers: { 'Accept': 'application/vnd.github.raw+json' }
          });
          if (readmeRes.ok) readme = await readmeRes.text();
        } catch (e) {}

        // Process data
        const langMap = {};
        repos.forEach(r => { if (r.language) langMap[r.language] = (langMap[r.language] || 0) + 1; });
        const topLangs = Object.entries(langMap).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([l]) => l);
        const totalStars = repos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
        const totalForks = repos.reduce((s, r) => s + (r.forks_count || 0), 0);

        // Check what's missing
        const missing = [];
        if (!readme) missing.push('README.md');
        if (readme && !readme.includes('img.shields.io') && !readme.includes('badgen')) missing.push('Badges');
        if (readme && !readme.includes('github-readme-stats')) missing.push('Stats Widget');
        if (readme && !readme.includes('streak-stats')) missing.push('Streak Stats');
        if (readme && !readme.includes('skillicons') && !readme.includes('devicons')) missing.push('Skill Icons');
        if (readme && !readme.includes('github-profile-trophy')) missing.push('Trophies');

        profileData = { user, topLangs, totalStars, totalForks, repoCount: user.public_repos || repos.length, hasReadme: !!readme, missing };

        renderProfile();
        generateReadme();

        results.classList.add('active');

      } catch (err) {
        error.textContent = '❌ ' + err.message;
        error.classList.add('active');
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 تحلیل';
        loading.classList.remove('active');
      }
    }

    // --- Render profile analysis ---
    function renderProfile() {
      const { user, topLangs, totalStars, totalForks, repoCount, hasReadme, missing } = profileData;
      const card = document.getElementById('profileCard');

      let html = `
        <div class="profile-info">
          <img src="${user.avatar_url}" alt="${user.login}">
          <div class="info">
            <h3>${user.name || user.login}</h3>
            <p>@${user.login} · ${user.bio || ''}</p>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><div class="num">${repoCount}</div><div class="label">ریپو</div></div>
          <div class="stat-box"><div class="num">${totalStars}</div><div class="label">ستاره</div></div>
          <div class="stat-box"><div class="num">${totalForks}</div><div class="label">فورک</div></div>
          <div class="stat-box"><div class="num">${user.followers || 0}</div><div class="label">فالوور</div></div>
        </div>`;

      if (topLangs.length) {
        html += `<div style="margin-top:12px;color:var(--text2);font-size:0.9rem;">💻 زبان‌ها: ${topLangs.join(' · ')}</div>`;
      }

      html += `<div class="missing-list">
        <div style="color:var(--text2);font-size:0.9rem;margin-bottom:4px;">وضعیت پروفایل:</div>
        <div class="item">${hasReadme ? '<span class="check">✅</span>' : '<span class="cross">❌</span>'} README.md</div>
        ${missing.map(m => `<div class="item"><span class="cross">➖</span> ${m}</div>`).join('')}
        ${missing.length === 0 ? '<div class="item"><span class="check">✅</span> پروفایل کامل است! 🎉</div>' : ''}
      </div>`;

      card.innerHTML = html;
    }

    // --- Template selection ---
    function selectTemplate(el) {
      document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedTemplate = el.dataset.template;
      generateReadme();
    }

    function selectTheme(el) {
      document.querySelectorAll('.theme-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedTheme = el.dataset.theme;
      generateReadme();
    }

    // --- Generate README ---
    function generateReadme() {
      if (!profileData) return;
      const { user, topLangs, totalStars, totalForks, repoCount } = profileData;
      const username = user.login;
      const name = user.name || username;
      const bio = user.bio || '';
      const theme = selectedTheme;

      let md = '';

      if (selectedTemplate === 'full') {
        md += `# Hi 👋, I'm ${name}!\n\n`;
        if (bio) md += `${bio}\n\n`;
        md += `<p align="center">\n`;
        md += `  <img src="https://img.shields.io/badge/Followers-${user.followers || 0}-blue?style=flat-square&logo=github" alt="Followers">\n`;
        md += `  <img src="https://img.shields.io/badge/Stars-${totalStars}-yellow?style=flat-square&logo=github" alt="Stars">\n`;
        md += `  <img src="https://img.shields.io/badge/Repos-${repoCount}-green?style=flat-square&logo=github" alt="Repos">\n`;
        md += `</p>\n\n`;

        md += `### 🚀 About Me\n\n`;
        if (user.location) md += `- 🌍 Based in ${user.location}\n`;
        if (user.company) md += `- 💼 Working at ${user.company}\n`;
        if (user.blog) md += `- 🌐 Visit my [website](${user.blog})\n`;
        md += `- 💻 ${repoCount} public repositories\n`;
        md += `- ⭐ ${totalStars} total stars earned\n\n`;

        if (topLangs.length) {
          md += `### 🛠️ Tech Stack\n\n`;
          const badges = topLangs.filter(l => BADGE_MAP[l]).map(l => `![${l}](https://img.shields.io/badge/${BADGE_MAP[l]})`).join(' ');
          if (badges) md += `${badges}\n\n`;
          const icons = topLangs.filter(l => SKILL_ICON_MAP[l]).map(l => SKILL_ICON_MAP[l]).join(',');
          if (icons) md += `<p align="center">\n  <img src="https://skillicons.dev/icons?i=${icons}" alt="Skills">\n</p>\n\n`;
        }

        md += `### 📊 GitHub Stats\n\n`;
        md += `<p align="center">\n`;
        md += `  <img src="https://github-readme-stats.vercel.app/api?username=${username}&show_icons=true&theme=${theme}" alt="Stats">\n`;
        md += `  <img src="https://github-readme-streak-stats.herokuapp.com/?user=${username}&theme=${theme}" alt="Streak">\n`;
        md += `  <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=${username}&layout=compact&theme=${theme}" alt="Top Languages">\n`;
        md += `</p>\n\n`;

        md += `### 🏆 Trophies\n\n`;
        md += `<p align="center">\n  <img src="https://github-profile-trophy.vercel.app/?username=${username}" alt="Trophies">\n</p>\n\n`;

        md += `---\n⭐️ From [${username}](https://github.com/${username})\n`;
      }

      else if (selectedTemplate === 'minimal') {
        md += `# ${name}\n\n`;
        if (bio) md += `${bio}\n\n`;
        md += `<p align="center">\n  <img src="https://github-readme-stats.vercel.app/api?username=${username}&show_icons=true&theme=${theme}" alt="Stats">\n</p>\n\n`;
        if (topLangs.length) {
          const badges = topLangs.filter(l => BADGE_MAP[l]).map(l => `![${l}](https://img.shields.io/badge/${BADGE_MAP[l]})`).join(' ');
          if (badges) md += `${badges}\n`;
        }
        md += `\n---\n⭐️ [${username}](https://github.com/${username})\n`;
      }

      else if (selectedTemplate === 'stats') {
        md += `# ${name} 👋\n\n`;
        md += `<p align="center">\n`;
        md += `  <img src="https://github-readme-stats.vercel.app/api?username=${username}&show_icons=true&theme=${theme}" alt="Stats" height="160">\n`;
        md += `  <img src="https://github-readme-streak-stats.herokuapp.com/?user=${username}&theme=${theme}" alt="Streak" height="160">\n`;
        md += `</p>\n\n`;
        if (topLangs.length) {
          const icons = topLangs.filter(l => SKILL_ICON_MAP[l]).map(l => SKILL_ICON_MAP[l]).join(',');
          if (icons) md += `<p align="center">\n  <img src="https://skillicons.dev/icons?i=${icons}" alt="Skills">\n</p>\n`;
        }
      }

      // Update output
      document.getElementById('codeOutput').textContent = md;

      // Update preview
      const previewFrame = document.getElementById('previewFrame');
      const previewDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      previewDoc.open();
      previewDoc.write(`
        <html>
        <head>
          <style>
            body { font-family: -apple-system, 'Segoe UI', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; color: #333; }
            img { max-width: 100%; height: auto; border-radius: 8px; }
            p { margin: 8px 0; }
            h1 { margin-bottom: 8px; }
            hr { border: none; border-top: 1px solid #e1e4e8; margin: 16px 0; }
            code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
          </style>
        </head>
        <body>${markedMarkdown(md)}</body>
        </html>
      `);
      previewDoc.close();
    }

    // --- Simple markdown to HTML for preview ---
    function markedMarkdown(md) {
      let html = md;
      // Headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      // Images
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      // Align tags
      html = html.replace(/<p align="center">/g, '<div style="text-align:center;">');
      html = html.replace(/<\/p>/g, '</div>');
      // Horizontal rule
      html = html.replace(/^---$/gm, '<hr>');
      // Line breaks
      html = html.replace(/\n/g, '<br>\n');
      // List items
      html = html.replace(/- (.+?)(<br>|$)/g, '<li>$1</li>');
      // Clean up
      html = html.replace(/(<br>\s*){3,}/g, '<br><br>');
      return html;
    }

    // --- Copy code ---
    function copyCode() {
      const code = document.getElementById('codeOutput').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.querySelector('.copy-btn');
        const orig = btn.textContent;
        btn.textContent = '✅ کپی شد!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    }

    // --- Enter key support ---
    document.getElementById('username').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
